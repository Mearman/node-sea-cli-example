name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
          - os: macos-latest
            label: macos-arm64
          - os: macos-13
            label: macos-x64
          - os: windows-latest
            label: windows-x64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
      - run: npm install
      - run: npm run test:unit
        shell: bash
      - run: npm run test:integration
        shell: bash

  build-and-e2e:
    name: Build & E2E (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            binary: node-sea-cli-example
          - os: macos-latest
            label: macos-arm64
            binary: node-sea-cli-example
          - os: macos-13
            label: macos-x64
            binary: node-sea-cli-example
          - os: windows-latest
            label: windows-x64
            binary: node-sea-cli-example.exe
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
      - run: npm install
      - run: npm run build
      - name: Make binary executable (Unix)
        if: runner.os != 'Windows'
        run: chmod +x dist/${{ matrix.binary }}
      - run: npm run test:e2e
        shell: bash

  build-linux-arm64:
    name: Build & E2E (linux-arm64 via QEMU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64
      - name: Build and test in ARM64 container
        run: |
          docker run --rm --platform linux/arm64 -v "$PWD:/workspace" -w /workspace node:26 bash -c "
            npm install &&
            npm run build &&
            chmod +x dist/node-sea-cli-example &&
            npm run test:e2e
          "

  release:
    name: Upload Artifacts
    needs: [test, build-and-e2e, build-linux-arm64]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: node-sea-cli-example-linux-x64
            binary: node-sea-cli-example
          - os: macos-latest
            artifact: node-sea-cli-example-macos-arm64
            binary: node-sea-cli-example
          - os: macos-13
            artifact: node-sea-cli-example-macos-x64
            binary: node-sea-cli-example
          - os: windows-latest
            artifact: node-sea-cli-example-windows-x64.exe
            binary: node-sea-cli-example.exe
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
      - run: npm install
      - run: npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.binary }}

  release-linux-arm64:
    name: Upload Artifact (linux-arm64)
    needs: [test, build-and-e2e, build-linux-arm64]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64
      - name: Build in ARM64 container
        run: |
          docker run --rm --platform linux/arm64 -v "$PWD:/workspace" -w /workspace node:26 bash -c "
            npm install &&
            npm run build
          "
      - uses: actions/upload-artifact@v7
        with:
          name: node-sea-cli-example-linux-arm64
          path: dist/node-sea-cli-example
